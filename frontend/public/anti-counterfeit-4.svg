<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#f9fafb"/>
  <text x="300" y="28" font-size="16" font-weight="700" text-anchor="middle" fill="#111827">官方授权渠道</text>

  <!-- 正品 -->
  <g transform="translate(40,60)">
    <rect width="220" height="280" rx="10" fill="#0ea5e9" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">✓ 正品渠道</text>
    <text x="110" y="60" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">正品特征</text>
    <g transform="translate(20,85)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">泡泡玛特天猫旗舰店</text>
    </g><g transform="translate(20,115)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">京东自营官方店</text>
    </g><g transform="translate(20,145)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">线下门店/快闪店</text>
    </g><g transform="translate(20,175)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">抽盒机官方小程序</text>
    </g>
  </g>

  <!-- 假货 -->
  <g transform="translate(340,60)">
    <rect width="220" height="280" rx="10" fill="#ea580c" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">✗ 假货渠道</text>
    <text x="110" y="60" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">假货特征</text>
    <g transform="translate(20,85)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">未授权 C 店 / 拼多多</text>
    </g><g transform="translate(20,115)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">闲鱼低于 6 折新链接</text>
    </g><g transform="translate(20,145)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">微商朋友圈 / 二级代理</text>
    </g><g transform="translate(20,175)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">海外免税店非授权版</text>
    </g>
  </g>

  <text x="300" y="380" font-size="10" text-anchor="middle" fill="#6b7280">对比要点请扫描官方防伪码二次确认</text>
</svg>