<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#f9fafb"/>
  <text x="300" y="28" font-size="16" font-weight="700" text-anchor="middle" fill="#111827">防伪码位置</text>

  <!-- 正品 -->
  <g transform="translate(40,60)">
    <rect width="220" height="280" rx="10" fill="#2563eb" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">✓ 正品防伪码</text>
    <text x="110" y="60" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">正品特征</text>
    <g transform="translate(20,85)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">盒盖内侧激光刻码</text>
    </g><g transform="translate(20,115)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">银色金属光泽，斜视可见</text>
    </g><g transform="translate(20,145)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">扫码进入官方验证</text>
    </g><g transform="translate(20,175)">
      <circle r="3" fill="#fff"/>
      <text x="14" y="4" font-size="9" fill="#fff">每码仅一次有效</text>
    </g>
  </g>

  <!-- 假货 -->
  <g transform="translate(340,60)">
    <rect width="220" height="280" rx="10" fill="#7c2d12" filter="url(#shadow)"/>
    <text x="110" y="30" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">✗ 假货防伪码</text>
    <text x="110" y="60" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">假货特征</text>
    <g transform="translate(20,85)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">外盒印刷普通</text>
    </g><g transform="translate(20,115)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">黑色油墨，无光泽</text>
    </g><g transform="translate(20,145)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">扫码跳第三方钓鱼站</text>
    </g><g transform="translate(20,175)">
      <circle r="3" fill="#fbbf24"/>
      <text x="14" y="4" font-size="9" fill="#fff">可重复使用/批量复制</text>
    </g>
  </g>

  <text x="300" y="380" font-size="10" text-anchor="middle" fill="#6b7280">对比要点请扫描官方防伪码二次确认</text>
</svg>