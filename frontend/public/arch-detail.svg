  </g>
  <g transform="translate(540,310)">
    <rect width="200" height="60" rx="8" fill="#7c2d12" stroke="#fb923c" stroke-width="1"/>
    <text x="100" y="26" font-size="12" text-anchor="middle" fill="#fff">ReAct RAG</text>
