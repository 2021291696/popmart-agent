    <text y="14" font-size="11" text-anchor="middle" fill="#ccfbf1">self-Loop</text>
    <text y="34" font-size="10" text-anchor="middle" fill="#ccfbf1">动态重试</text>
  </g>

  <g transform="translate(540,90)">
