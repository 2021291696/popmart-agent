# 泡泡玛特 Agent — 基础主题
# 精确视觉由 src/theme.py 的注入 CSS 接管;此处仅定基调,避免首帧闪白。

[theme]
base = "dark"
primaryColor = "#c65f4e"           # 陶土红 accent — oklch(60% 0.19 20)
backgroundColor = "#14161c"        # 近黑冷底 — oklch(15% 0.01 260)
secondaryBackgroundColor = "#1c1f27"  # 表面层 — oklch(20% 0.01 260)
textColor = "#ebe9e4"              # 暖白 — oklch(93% 0.005 90)
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
