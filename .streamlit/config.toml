# 泡泡玛特 Agent — 基础主题
# 精确视觉由 src/theme.py 的注入 CSS 接管;此处仅定基调,避免首帧闪白。

[theme]
base = "dark"
primaryColor = "#e35d58"
backgroundColor = "#151515"
secondaryBackgroundColor = "#1d1d1d"
textColor = "#f2f0eb"
font = "sans serif"

[server]
headless = true
address = "127.0.0.1"

[browser]
gatherUsageStats = false
